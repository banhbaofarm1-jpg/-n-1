import tkinter as tk
from tkinter import ttk
from tkinter import scrolledtext

# ── 1. Dữ liệu quy tắc (chỉ lấy một phần ví dụ, bạn copy đầy đủ 120 cái vào đây)
# Dùng dict với key là tuple (X, E, R, F, T) → value là dict kết quả
rules = {
    # X1 - Y tế
    ("X1", "E1", "R3", "F2", "T1"): {"truong": "Đại học Y Hà Nội", "nganh": "Y khoa", "ma": "d01"},
    ("X1", "E1", "R3", "F3", "T0"): {"truong": "Đại học Y Dược TP.HCM", "nganh": "Y khoa", "ma": "d02"},
    ("X1", "E1", "R2", "F1", "T2"): {"truong": "Đại học Y Dược Huế", "nganh": "Y khoa", "ma": "d03"},
    ("X1", "E1", "R3", "F0", "T1"): {"truong": "Đại học Y Hà Nội (Điều dưỡng)", "ma": "d04"},
    # ... thêm tiếp các quy tắc khác ở đây (tổng 120)
    # Ví dụ X4 CNTT
    ("X4", "E0", "R3", "F2", "T1"): {"truong": "Đại học Bách khoa Hà Nội", "nganh": "Khoa học Máy tính", "ma": "d31"},
    ("X4", "E0", "R2", "F1", "T0"): {"truong": "Đại học Công nghệ Thông tin - ĐHQG TP.HCM", "nganh": "Trí tuệ Nhân tạo", "ma": "d32"},
    # Thêm hết 120 quy tắc vào đây...
    # Nếu không match thì None
}

# Nếu bạn muốn dùng match-case (Python 3.10+), có thể thay bằng hàm sau:
def tim_truong(x, e, r, f, t):
    match (x, e, r, f, t):
        case ("X1", "E1", "R3", "F2", "T1"):
            return {"truong": "Đại học Y Hà Nội", "nganh": "Y khoa", "ma": "d01"}
        case ("X1", "E1", "R3", "F3", "T0"):
            return {"truong": "Đại học Y Dược TP.HCM", "nganh": "Y khoa", "ma": "d02"}
        # ... thêm tiếp
        case _:
            return None

# ── 2. Hàm xử lý tìm kiếm
def tim_kiem():
    x = combo_x.get()
    e = combo_e.get()
    r = combo_r.get()
    f = combo_f.get()
    t = combo_t.get()

    # Nếu dùng dict rules:
    key = (x, e, r, f, t)
    ketqua = rules.get(key)

    # Hoặc nếu dùng match-case:
    # ketqua = tim_truong(x, e, r, f, t)

    text_result.delete(1.0, tk.END)  # xóa nội dung cũ

    if ketqua:
        text_result.insert(tk.END, f"Kết quả phù hợp:\n\n")
        text_result.insert(tk.END, f"Trường: {ketqua['truong']}\n")
        if "nganh" in ketqua:
            text_result.insert(tk.END, f"Ngành: {ketqua['nganh']}\n")
        text_result.insert(tk.END, f"Mã: {ketqua['ma']}\n")
        text_result.insert(tk.END, f"\n(X={x}, E={e}, R={r}, F={f}, T={t})")
    else:
        text_result.insert(tk.END, "Không tìm thấy trường phù hợp với tiêu chí bạn chọn.\n")
        text_result.insert(tk.END, f"Tiêu chí: X={x}, E={e}, R={r}, F={f}, T={t}")

# ── 3. Tạo giao diện
root = tk.Tk()
root.title("Tư vấn chọn trường đại học")
root.geometry("780x580")
root.configure(bg="#f0f0f0")

# Frame tiêu đề và bộ lọc
frame_top = tk.Frame(root, bg="#f0f0f0")
frame_top.pack(pady=15, padx=20, fill="x")

# Tiêu đề
tk.Label(frame_top, text="TƯ VẤN CHỌN TRƯỜNG ĐẠI HỌC", font=("Arial", 16, "bold"), bg="#f0f0f0").pack(pady=5)

# Frame các combobox
frame_filter = tk.Frame(frame_top, bg="#f0f0f0")
frame_filter.pack(pady=10)

# Hàng 1: Hãng SX → tương ứng X (Khối ngành)
tk.Label(frame_filter, text="Khối ngành", bg="#f0f0f0", font=("Arial", 10, "bold")).grid(row=0, column=0, padx=10, pady=5, sticky="w")

combo_x = ttk.Combobox(frame_filter, values=["-- Tất cả --", "X1 - Y tế - sức khỏe", "X2 - Giáo dục - sư phạm", "X3 - Kỹ thuật Kỹ sư", "X4 - Công nghệ thông tin – AI", "X5 - Kinh doanh – quản trị", "X6 - Marketing – truyền thông", "X7 - Tài chính – kế toán", "X8 - Luật – pháp lý", "X9 - Nông – Lâm – Ngư", "X10 - Du lịch – khách sạn", "X11 - Ngoại giao – Ngôn ngữ", "X12 - Quân đội – công an"], width=35, state="readonly")
combo_x.grid(row=1, column=0, padx=10, pady=5)
combo_x.current(0)

# Hàng 2: Mức giá, RAM, Bộ nhớ → tương ứng E, R, F
labels = ["Khối thi", "Điểm thi", "Ngân sách/năm", "Khu vực"]
values = [
    ["-- Tất cả --", "E0 - A", "E1 - B", "E2 - C", "E3 - D", "E4 - NK"],
    ["-- Tất cả --", "R0: dưới 15 điểm", "R1: 16-20 điểm", "R2: 21-25 điểm", "R3: trên 25 điểm"],
    ["-- Tất cả --", "F0: Dưới 15 triệu", "F1: 16-25 triệu", "F2: 26-35 triệu", "F3: trên 36 triệu"],
    ["-- Tất cả --", "T0 - Miền Nam", "T1 - Miền Bắc", "T2 - Miền Trung"]
]

combos = []
for i, (label_text, opts) in enumerate(zip(labels, values)):
    tk.Label(frame_filter, text=label_text, bg="#f0f0f0", font=("Arial", 10, "bold")).grid(row=0, column=i+1, padx=10, pady=5, sticky="w")
    combo = ttk.Combobox(frame_filter, values=opts, width=28, state="readonly")
    combo.grid(row=1, column=i+1, padx=10, pady=5)
    combo.current(0)
    combos.append(combo)

combo_e, combo_r, combo_f, combo_t = combos

# Nút TÌM KIẾM
btn_tim = tk.Button(frame_top, text="TÌM KIẾM", bg="#007bff", fg="white", font=("Arial", 12, "bold"), width=15, command=tim_kiem)
btn_tim.pack(pady=15)

# Hướng dẫn nhỏ
tk.Label(frame_top, text="Chọn đầy đủ hoặc một phần tiêu chí → Nhấn TÌM KIẾM để xem gợi ý", bg="#f0f0f0", fg="#555").pack()

# ── 4. Khu vực kết quả
frame_result = tk.Frame(root, bg="white", bd=2, relief="groove")
frame_result.pack(padx=20, pady=10, fill="both", expand=True)

text_result = scrolledtext.ScrolledText(frame_result, wrap=tk.WORD, font=("Arial", 11), height=18, bg="#ffffff", fg="#000")
text_result.pack(padx=10, pady=10, fill="both", expand=True)

# Chạy chương trình
root.mainloop()